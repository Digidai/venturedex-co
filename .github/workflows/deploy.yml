name: Deploy to Cloudflare Workers

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      # Cloudflare Web Analytics beacon token (public id, not a secret). Inlined at
      # build time so the beacon ships on the deployed pages. See docs/observability.md.
      PUBLIC_CF_BEACON_TOKEN: ${{ vars.PUBLIC_CF_BEACON_TOKEN }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Verify Cloudflare auth and D1 access
        run: |
          set -euo pipefail

          test -n "${CLOUDFLARE_API_TOKEN}"
          test -n "${CLOUDFLARE_ACCOUNT_ID}"

          python3 - <<'PY'
          import json
          import os
          import urllib.request

          token = os.environ["CLOUDFLARE_API_TOKEN"]
          account_id = os.environ["CLOUDFLARE_ACCOUNT_ID"]

          def fetch(url: str):
              req = urllib.request.Request(
                  url,
                  headers={
                      "Authorization": f"Bearer {token}",
                      "Content-Type": "application/json",
                  },
              )
              with urllib.request.urlopen(req) as resp:
                  return json.load(resp)

          verify = fetch("https://api.cloudflare.com/client/v4/user/tokens/verify")
          if not verify.get("success") or verify.get("result", {}).get("status") != "active":
              raise SystemExit(f"Cloudflare token verify failed: {verify}")

          account = fetch(f"https://api.cloudflare.com/client/v4/accounts/{account_id}")
          if not account.get("success"):
              raise SystemExit(f"Cloudflare account lookup failed: {account}")
          PY

          npx wrangler d1 info venturedex-db --json --config wrangler.toml >/dev/null

      - name: Run unified release flow
        run: bash scripts/manage.sh release
