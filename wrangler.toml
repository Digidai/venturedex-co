name = "venturedex"
main = "dist/_worker.js/index.js"
compatibility_date = "2026-04-13"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = "dist"
binding = "ASSETS"

[vars]
SITE_URL = "https://venturedex.co"

[[d1_databases]]
binding = "DB"
database_name = "venturedex-db"
database_id = "c8acc18c-edea-4ff4-be78-4bf9c042f725"

[[r2_buckets]]
binding = "R2"
bucket_name = "venturedex-assets"
